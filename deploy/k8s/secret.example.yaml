apiVersion: v1
kind: Secret
metadata:
  name: buildsage-secrets
  namespace: buildsage
type: Opaque
stringData:
  JWT_SECRET: "replace-with-at-least-32-random-characters"
  DATABASE_URL: "jdbc:postgresql://postgres.example.internal:5432/buildsage"
  DATABASE_USERNAME: "buildsage"
  DATABASE_PASSWORD: "replace-me"
