apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: buildsage-api
  namespace: buildsage
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - buildsage.example.com
      secretName: buildsage-tls
  rules:
    - host: buildsage.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: buildsage-api
                port:
                  name: http
