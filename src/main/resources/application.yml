spring:
  application:
    name: buildsage-java
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/buildsage}
    username: ${DATABASE_USERNAME:buildsage}
    password: ${DATABASE_PASSWORD:buildsage}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc.time_zone: UTC
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.10}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

security:
  jwt:
    issuer: ${JWT_ISSUER:buildsage-local}
    secret: ${JWT_SECRET}
    ttl-minutes: ${JWT_TTL_MINUTES:120}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

ai:
  provider: ${AI_PROVIDER:mock}
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:llama3.1}
  external:
    base-url: ${EXTERNAL_AI_BASE_URL:https://api.openai.com}
    api-key: ${EXTERNAL_AI_API_KEY:}
    model: ${EXTERNAL_AI_MODEL:gpt-4o-mini}

webhooks:
  github:
    secret: ${GITHUB_WEBHOOK_SECRET:}

notifications:
  webhook:
    enabled: ${NOTIFICATION_WEBHOOK_ENABLED:false}
    url: ${NOTIFICATION_WEBHOOK_URL:}
    secret: ${NOTIFICATION_WEBHOOK_SECRET:}

logging:
  pattern:
    level: "%5p [%X{correlationId:-no-correlation}]"
