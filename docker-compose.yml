services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: buildsage
      POSTGRES_USER: buildsage
      POSTGRES_PASSWORD: buildsage
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildsage -d buildsage"]
      interval: 10s
      timeout: 5s
      retries: 8
    volumes:
      - postgres-data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8
    ports:
      - "${VALKEY_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/buildsage
      DATABASE_USERNAME: buildsage
      DATABASE_PASSWORD: buildsage
      REDIS_HOST: valkey
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env before starting the app}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/readiness | grep UP"]
      interval: 15s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
